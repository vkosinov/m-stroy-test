name: Run Vitest Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. Клонируем репозиторий
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Устанавливаем Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. Устанавливаем pnpm через npm
      - name: Install pnpm
        run: npm install -g pnpm@8

      # 4. Проверяем, что pnpm доступен
      - name: Check pnpm
        run: pnpm --version

      # 5. Устанавливаем зависимости
      - name: Install dependencies
        run: pnpm install

      # 6. Запускаем Vitest
      - name: Run Vitest
        run: pnpm exec vitest run --reporter=github-actions
